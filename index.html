<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="Personal portfolio showcasing projects and skills" />
  <title>My Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css?v=4" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/skills.css" />
  <link rel="stylesheet" href="css/typing-game.css" />
  <link rel="stylesheet" href="css/typing-game-ai.css" />
  <link rel="stylesheet" href="css/typing-game-intro.css" />
  <link rel="stylesheet" href="css/music-player.css" />
  <link rel="stylesheet" href="css/visualizer.css" />
  <link rel="stylesheet" href="css/rain.css" />
  <!-- Restore saved theme + lang before any IIFE to avoid flash -->
  <script>(function(){var t=localStorage.getItem('portfolio_theme');if(t==='dark'||t==='nature'){document.documentElement.setAttribute('data-theme',t);var f={dark:'assets/images/favicon-dark.svg',nature:'assets/images/favicon-nature.svg'};var l=document.querySelector('link[rel="icon"]');if(l)l.href=f[t];}var g=localStorage.getItem('portfolio_lang');if(g==='en')document.documentElement.lang='en';})()</script>
</head>
<body>
  <!-- Video backgrounds for dark & nature themes -->
  <video class="bg-video bg-video--dark" id="bg-video-dark" autoplay muted loop playsinline preload="none" poster="assets/images/backgoundKatanaPoster.jpg">
    <source src="assets/images/backgroundKatana.mp4" type="video/mp4">
  </video>
  <video class="bg-video bg-video--nature" id="bg-video-nature" autoplay muted loop playsinline preload="none" poster="assets/images/hollowbackgroundPoster.jpg">
    <source src="assets/images/hollowbackground.mp4" type="video/mp4">
  </video>

  <!-- Navigation -->
  <header class="header" id="header">
    <nav class="nav container">
      <div class="music-player" id="music-player"></div>
      <button class="music-trigger" id="music-trigger" aria-label="Music player">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <span class="music-trigger__bars" aria-hidden="true">
          <i></i><i></i><i></i>
        </span>
      </button>
      <div class="nav__list-wrapper">
        <ul class="nav__list">
          <li><a href="#hero" class="nav__link" data-i18n="navHome">Accueil</a></li>
          <li><a href="#projects" class="nav__link" data-i18n="navProjects">Projets</a></li>
          <li><a href="#skills" class="nav__link" data-i18n="navSkills">Compétences</a></li>
          <li><a href="#cv" class="nav__link" data-i18n="navCv">CV</a></li>
          <li><a href="#contact" class="nav__link" data-i18n="navContact">Contact</a></li>
        </ul>
        <div class="nav__indicator" id="nav-indicator"></div>
      </div>
      <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">
        <svg class="lang-toggle__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <ellipse cx="12" cy="12" rx="4" ry="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
        <span class="lang-toggle__label" id="lang-label">FR</span>
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="theme-toggle__icon" viewBox="0 0 24 24" width="22" height="22">
          <defs>
            <mask id="moon-mask">
              <rect x="0" y="0" width="24" height="24" fill="white"/>
              <circle class="theme-toggle__cutout" cx="18" cy="6" r="0" fill="black"/>
            </mask>
          </defs>
          <!-- Sun rays -->
          <g class="theme-toggle__rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </g>
          <!-- Sun/Moon body -->
          <circle class="theme-toggle__body" cx="12" cy="12" r="5" fill="currentColor" mask="url(#moon-mask)"/>
          <!-- Leaf (nature theme) -->
          <path class="theme-toggle__leaf" d="M12 3C8 7 6 11 6 14.5C6 18.1 8.7 21 12 21C15.3 21 18 18.1 18 14.5C18 11 16 7 12 3Z" fill="currentColor"/>
          <line class="theme-toggle__vein" x1="12" y1="8" x2="12" y2="18"/>
          <line class="theme-toggle__vein theme-toggle__vein--left" x1="12" y1="12" x2="9" y2="10"/>
          <line class="theme-toggle__vein theme-toggle__vein--right" x1="12" y1="14" x2="15" y2="12"/>
        </svg>
      </button>
      <script>
        (function(){var t=document.documentElement.getAttribute('data-theme');
        if(!t)return;
        var b=document.querySelector('.theme-toggle__body'),c=document.querySelector('.theme-toggle__cutout');
        if(t==='dark'){if(b)b.setAttribute('r','8');if(c){c.setAttribute('r','7');c.setAttribute('cx','17');c.setAttribute('cy','7');}}
        else if(t==='nature'){if(b)b.setAttribute('r','0');if(c)c.setAttribute('r','0');}})();
      </script>
      <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main>
    <!-- Hero Section — Typing Game -->
    <section class="hero section" id="hero">
      <div class="container hero__content">
        <h2 class="section__title">Paolo Colombat : <em>Typing Game</em></h2>
        <div class="typing-game" id="typing-game"></div>
      </div>
      <a href="#projects" class="scroll-hint" id="scroll-hint" aria-label="Scroll down">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </a>
    </section>

    <!-- Projects Section -->
    <section class="projects section" id="projects">
      <div class="container">
        <h2 class="section__title" data-i18n="sectionProjects">Projets</h2>
        <div class="projects__grid" id="projects-grid">
          <!-- Project cards are rendered by js/main.js from js/data.js -->
        </div>
      </div>
    </section>

    <!-- Skills Section -->
    <section class="skills section" id="skills">
      <div class="container">
        <h2 class="section__title" data-i18n="sectionSkills">Compétences</h2>
        <div class="skills__grid" id="skills-grid">
          <!-- Skill items are rendered by js/main.js from js/data.js -->
        </div>
      </div>
    </section>

    <!-- CV Section -->
    <section class="cv-section section" id="cv">
      <div class="container">
        <h2 class="section__title" data-i18n="sectionCv">Curriculum Vitae</h2>
        <div class="cv-section__card">
          <div class="cv-section__viewer">
            <iframe src="assets/doc/CV_Paolo.pdf" title="CV Paolo"></iframe>
          </div>
          <div class="cv-section__footer">
            <a href="assets/doc/CV_Paolo.pdf" download="CV_Paolo.pdf" class="btn btn--primary" data-i18n="cvDownload">Télécharger le CV</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section class="contact section" id="contact">
      <div class="container">
        <h2 class="section__title" data-i18n="sectionContact">Contact</h2>
        <form class="contact__form" id="contact-form" action="https://formspree.io/f/mkovoawq" method="POST">
          <!-- Honeypot anti-spam (hidden from users) -->
          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
          <div class="form__group">
            <label for="name" data-i18n="labelName">Nom</label>
            <input type="text" id="name" name="name" required minlength="2" maxlength="100" />
          </div>
          <div class="form__group">
            <label for="email" data-i18n="labelEmail">Email</label>
            <input type="email" id="email" name="email" required maxlength="254" />
          </div>
          <div class="form__group">
            <label for="message" data-i18n="labelMessage">Message</label>
            <textarea id="message" name="message" rows="5" required minlength="10" maxlength="3000"></textarea>
          </div>
          <div class="form__actions">
            <button type="submit" class="btn btn--primary" data-i18n="submitBtn">Envoyer le message</button>
          </div>
          <p id="form-status" class="form__status" style="display:none;"></p>
        </form>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; <span id="year" class="footer__availability"></span> <span data-i18n="footerText">Paolo Colombat. Cherche une alternance</span></p>
      <ul class="footer__socials">
        <li><a href="https://github.com/Paolo-clb" aria-label="GitHub" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/paolo-colombat-849503371/" aria-label="LinkedIn" target="_blank" rel="noopener">LinkedIn</a></li>
      </ul>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/typing-texts.js"></script>
  <script src="js/typing-game-i18n.js"></script>
  <script src="js/typing-game-ai.js"></script>
  <script src="js/typing-game-intro.js"></script>
  <script src="js/typing-game.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/rain-engine.js"></script>
  <script src="js/rain.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
