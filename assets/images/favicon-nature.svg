<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="leafGradient" cx="45%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#7bda4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5eb83a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Outer glow rings -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#5eb83a" stroke-width="0.5" opacity="0.3"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#5eb83a" stroke-width="0.5" opacity="0.4"/>

  <!-- Leaf body -->
  <path d="M16 4 C9 9, 7 16, 9 22 C11 27, 16 28, 16 28 C16 28, 21 27, 23 22 C25 16, 23 9, 16 4 Z"
        fill="url(#leafGradient)"/>

  <!-- Center vein -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="#3a8f20" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>

  <!-- Side veins -->
  <g stroke="#3a8f20" stroke-width="0.6" opacity="0.4" stroke-linecap="round">
    <line x1="16" y1="12" x2="11" y2="10"/>
    <line x1="16" y1="16" x2="10" y2="15"/>
    <line x1="16" y1="20" x2="11" y2="20"/>
    <line x1="16" y1="12" x2="21" y2="10"/>
    <line x1="16" y1="16" x2="22" y2="15"/>
    <line x1="16" y1="20" x2="21" y2="20"/>
  </g>

  <!-- Inner highlight -->
  <circle cx="14" cy="13" r="3" fill="#7bda4e" opacity="0.4"/>
</svg>
