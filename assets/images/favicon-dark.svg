<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black circular background -->
  <circle cx="16" cy="16" r="16" fill="#0d0c14"/>
  <defs>
    <radialGradient id="moonGradient" cx="40%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1" />
    </radialGradient>
    <mask id="crescentMask">
      <rect width="32" height="32" fill="white"/>
      <circle cx="21" cy="12" r="8" fill="black"/>
    </mask>
  </defs>

  <!-- Outer glow rings -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#9c27b0" stroke-width="0.5" opacity="0.3"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#9c27b0" stroke-width="0.5" opacity="0.4"/>

  <!-- Stars -->
  <g fill="#ff4ecb" opacity="0.7">
    <circle cx="26" cy="7" r="1.2"/>
    <circle cx="28" cy="15" r="0.8"/>
    <circle cx="25" cy="24" r="0.6"/>
  </g>

  <!-- Crescent moon -->
  <circle cx="15" cy="16" r="9" fill="url(#moonGradient)" mask="url(#crescentMask)"/>

  <!-- Inner highlight -->
  <circle cx="11" cy="19" r="2" fill="#ce93d8" opacity="0.5"/>
</svg>
